<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Lyric Craft Studio - ZiniMini AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: white; text-align: center; padding: 20px; }
        .box { max-width: 600px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #00d4ff; box-shadow: 0 0 15px rgba(0,212,255,0.3); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #2a2a2a; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #00d4ff; color: #000; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .link-row { display: flex; gap: 10px; margin-bottom: 5px; }
        #res { display: none; margin-top: 20px; background: #222; padding: 15px; border-radius: 10px; text-align: left; direction: ltr; font-family: monospace; font-size: 12px; overflow-x: auto; border: 1px dashed #555; white-space: pre-wrap; color: #00ff00; }
        .add-btn { background: #333; color: #00d4ff; padding: 5px; font-size: 13px; border: 1px solid #00d4ff; width: auto; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#00d4ff">Lyric Craft Studio</h2>
        <p>מערכת הפקת קוד הטמעה לבלוג</p>
        <input type="text" id="sid" placeholder="הדבק כאן את ה-ID">
        <input type="text" id="sty" placeholder="סגנון מוזיקלי">
        <textarea id="lyr" rows="5" placeholder="מילות השיר או מבנה השיר"></textarea>
        
        <div id="linksContainer">
            <div class="link-row">
                <input type="text" class="btnTxt" placeholder="טקסט כפתור">
                <input type="text" class="btnLnk" placeholder="כתובת קישור (URL)">
            </div>
        </div>
        <button type="button" class="add-btn" onclick="addLinkField()">➕ הוסף קישור נוסף</button>
        <button type="button" onclick="gen()">צור קוד לבלוג</button>
        
        <div id="res"></div>
        <button id="copyBtn" style="display:none; background:#32CD32" onclick="copy()">העתק קוד</button>
    </div>

    <script>
        function addLinkField() {
            var container = document.getElementById('linksContainer');
            var div = document.createElement('div');
            div.className = 'link-row';
            div.innerHTML = '<input type="text" class="btnTxt" placeholder="טקסט כפתור"> <input type="text" class="btnLnk" placeholder="כתובת קישור">';
            container.appendChild(div);
        }

        function gen() {
            var id = document.getElementById('sid').value.trim();
            var style = document.getElementById('sty').value.trim();
            var lyrics = document.getElementById('lyr').value.trim();
            if(!id) { alert("נא להזין ID"); return; }
            
            var txtIn = document.getElementsByClassName('btnTxt');
            var lnkIn = document.getElementsByClassName('btnLnk');
            var buttonsHtml = '';

            for (var i = 0; i < txtIn.length; i++) {
                var t = txtIn[i].value.trim();
                var l = lnkIn[i].value.trim();
                if(t && l) {
                    buttonsHtml += '<a href="' + l + '" target="_blank" style="display:inline-block; padding:8px 18px; background:#111; color:#00d4ff; text-decoration:none; border-radius:25px; font-weight:bold; font-size:13px; border:1px solid #00d4ff; margin:5px;">' + t + '</a>';
                }
            }

            // קוד הטמעה עם מונה גלובלי (שסופר את כל המבקרים)
            var finalCode = '<div style="direction:rtl; font-family:Arial,sans-serif; border:2px solid #222; border-radius:15px; overflow:hidden; max-width:100%; margin:20px auto; background:#fff; box-shadow:0 10px 20px rgba(0,0,0,0.2);">' +
                '<div style="background:#111; color:#00d4ff; padding:12px; font-weight:bold; text-align:center;">ZiniMini Music</div>' +
                '<div style="padding:15px; background:#f0f0f0;">' +
                    '<iframe src="https://suno.com/embed/' + id + '" width="100%" height="150" style="border:none; border-radius:10px; background:white;" allowfullscreen></iframe>' +
                '</div>' +
                '<div style="padding:15px;">' +
                    '<div style="font-size:11px; color:#888; font-weight:bold;">STYLE:</div>' +
                    '<div style="background:#1e1e1e; color:#32CD32; padding:10px; border-radius:5px; font-family:monospace; direction:ltr; text-align:left;">' + style + '</div>' +
                '</div>' +
                '<div style="padding:15px; background:#fafafa; border-top:1px solid #eee;">' +
                    '<div style="font-size:11px; color:#888; font-weight:bold;">LYRICS:</div>' +
                    '<div style="font-size:16px; line-height:1.6; color:#333; white-space:pre-wrap;">' + lyrics + '</div>' +
                '</div>' +
                '<div style="padding:15px; text-align:center; background:#f9f9f9; border-top:1px solid #eee; display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:10px;">' +
                    '<div style="font-size:12px; color:#333; font-weight:bold; background:#eee; padding:5px 10px; border-radius:8px; border:1px solid #ccc; display:flex; align-items:center; gap:5px;">' +
                        '👀 צפיות גלובליות: ' +
                        '<img src="https://counter.securiteinfo.com/count.php?page=zinimini_' + id + '&style=1" border="0" style="height:16px; vertical-align:middle;">' +
                    '</div>' +
                    buttonsHtml +
                '</div>' +
                '<div style="padding:5px; background:#f1f1f1; text-align:center; font-size:10px; color:#bbb;">prompts-il.blogspot.com</div>' +
                '</div>';

            document.getElementById('res').innerText = finalCode;
            document.getElementById('res').style.display = 'block';
            document.getElementById('copyBtn').style.display = 'block';
        }

        function copy() {
            var text = document.getElementById('res').innerText;
            var dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            alert("הקוד הועתק!");
        }
    </script>
</body>
</html>
