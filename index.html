<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Lyric Craft Studio - ZiniMini AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: white; text-align: center; padding: 20px; }
        .box { max-width: 600px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #00d4ff; box-shadow: 0 0 15px rgba(0,212,255,0.3); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #2a2a2a; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #00d4ff; color: #000; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        #res { display: none; margin-top: 20px; background: #222; padding: 15px; border-radius: 10px; text-align: left; direction: ltr; font-family: monospace; font-size: 12px; overflow-x: auto; border: 1px dashed #555; white-space: pre-wrap; color: #00ff00; }
    </style>
</head>

        <div id="res"></div>
        <button id="copyBtn" style="display:none; background:#32CD32" onclick="copy()">העתק קוד</button>
    </div>
