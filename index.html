        .add-btn { background: #333; color: #00d4ff; padding: 5px; font-size: 13px; border: 1px solid #00d4ff; width: auto; margin-bottom: 15px; }
    </style>
</head>

        <div id="res"></div>
        <button id="copyBtn" style="display:none; background:#32CD32" onclick="copy()">העתק קוד</button>
    </div>
